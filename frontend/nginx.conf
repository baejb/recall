# Host reverse proxy (nginx runs on the host, not in Docker).
# Serves the built SPA and forwards /api to the locally running backend.
server {
    listen 80;
    server_name _;

    # API → backend (proxy_buffering off keeps SSE streaming)
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
    }

    # SPA fallback — point root at the `npm run build` output (frontend/dist)
    location / {
        root /var/www/recall;   # e.g. copy frontend/dist here on deploy
        try_files $uri /index.html;
    }
}
